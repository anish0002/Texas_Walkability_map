<!DOCTYPE html>
<html>
<head>
    <title>Texas Walkability Map</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; }
        #map { height: 100vh; width: 100%; background: #f8f8f8; }
        .info-box { background: white; padding: 12px; border-radius: 5px; line-height: 1.6; }
        .score-val { float: right; font-weight: bold; margin-left: 20px; }
        .score-bar-wrap { clear: both; margin-top: 4px; background: #eee; border-radius: 4px; height: 8px; }
        .score-bar { height: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        // 1. Initialize map centered on Texas
        const map = L.map('map').setView([30.61, -96.34], 11);

        // 2. Tile layers (basemaps)
        const cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        });

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri'
        });

        const tileMaps = {
            "CARTO Voyager": cartoLayer,
            "OpenStreetMap": osmLayer,
            "Satellite": satelliteLayer
        };

        // 3. Helper: format 0–1 score as percentage string
        function fmt(v) {
            return v != null ? (v * 100).toFixed(1) + '%' : 'N/A';
        }

        // 4. Layer groups for data overlays
        const overallLayer  = L.layerGroup().addTo(map);
        const healthLayer   = L.layerGroup();
        const foodLayer     = L.layerGroup();
        const infraLayer    = L.layerGroup();
        const transitLayer  = L.layerGroup();

        // 5. Load GeoJSON
        fetch('WalkibilityScore1.geojson?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {

                // ── Compute quantile breaks (5 classes) ──
                const values = data.features
                    .map(f => f.properties.Final_walkscore)
                    .filter(v => v != null && !isNaN(v))
                    .sort((a, b) => a - b);

                const numClasses = 5;
                const breaks = [];
                for (let i = 1; i < numClasses; i++) {
                    const idx = Math.floor(i * values.length / numClasses);
                    breaks.push(values[idx]);
                }
                console.log('Quantile breaks:', breaks);

                // ── Color function: Red → Orange → Yellow → Green → Blue ──
                function getColor(s) {
                    if (s == null || isNaN(s)) return '#cccccc';
                    return s > breaks[3] ? '#2166ac' :   // Blue   (highest)
                           s > breaks[2] ? '#1a9641' :   // Green
                           s > breaks[1] ? '#fee08b' :   // Yellow
                           s > breaks[0] ? '#fdae61' :   // Orange
                                           '#d73027';    // Red    (lowest)
                }

                // ── Color bar for popup ──
                function bar(v) {
                    const pct = ((v || 0) * 100).toFixed(1);
                    return `<div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%;background:${getColor(v||0)}"></div></div>`;
                }

                // ── Build GeoJSON layer ──
                const geoLayer = L.geoJSON(data, {
                    style: (f) => ({
                        fillColor: getColor(f.properties.Final_walkscore),
                        weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7
                    }),
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        const popupContent = `
                            <div class="info-box">
                                <span style="font-size:0.8em;color:#666;">Cell ID: ${p.fid} &nbsp;|&nbsp; Row ${p.row_index}, Col ${p.col_index}</span><br>
                                <strong style="font-size:1.2em;">Walkability Score</strong><hr>
                                <b>Overall:</b> <span class="score-val">${fmt(p.Final_walkscore)}</span>${bar(p.Final_walkscore)}
                                <b>Hospital Access:</b> <span class="score-val">${fmt(p.hosp_n)}</span>${bar(p.hosp_n)}
                                <b>Food Access:</b> <span class="score-val">${fmt(p.food_n)}</span>${bar(p.food_n)}
                                <b>Sidewalk / Infra:</b> <span class="score-val">${fmt(p.walk_n)}</span>${bar(p.walk_n)}
                                <b>Transit:</b> <span class="score-val">${fmt(p.transit_n)}</span>${bar(p.transit_n)}
                            </div>`;
                        l.bindPopup(popupContent);

                        L.geoJSON(f, { style: { fillColor: getColor(p.Final_walkscore), fillOpacity: 0.7, weight: 1, color: 'white' } }).bindPopup(popupContent).addTo(overallLayer);
                        L.geoJSON(f, { style: { fillColor: getColor(p.hosp_n),          fillOpacity: 0.7, weight: 1, color: 'white' } }).bindPopup(popupContent).addTo(healthLayer);
                        L.geoJSON(f, { style: { fillColor: getColor(p.food_n),          fillOpacity: 0.7, weight: 1, color: 'white' } }).bindPopup(popupContent).addTo(foodLayer);
                        L.geoJSON(f, { style: { fillColor: getColor(p.walk_n),          fillOpacity: 0.7, weight: 1, color: 'white' } }).bindPopup(popupContent).addTo(infraLayer);
                        L.geoJSON(f, { style: { fillColor: getColor(p.transit_n),       fillOpacity: 0.7, weight: 1, color: 'white' } }).bindPopup(popupContent).addTo(transitLayer);
                    }
                });

                // 6. Data overlay maps
                const overlayMaps = {
                    "View: Overall Score":       overallLayer,
                    "View: Hospital Access":     healthLayer,
                    "View: Food Access":         foodLayer,
                    "View: Sidewalk / Infra":    infraLayer,
                    "View: Transit":             transitLayer
                };

                // 7. Layer control
                L.control.layers(tileMaps, overlayMaps, { collapsed: false }).addTo(map);

                // 8. Legend
                const legend = L.control({ position: 'bottomright' });
                legend.onAdd = () => {
                    const div = L.DomUtil.create('div', 'info-box');
                    div.innerHTML = '<strong>Score (Quantile)</strong><br>';
                    const ranges = [
                        { min: breaks[3], max: 1,         color: '#2166ac', label: 'Blue (Best)' },
                        { min: breaks[2], max: breaks[3],  color: '#1a9641', label: 'Green' },
                        { min: breaks[1], max: breaks[2],  color: '#fee08b', label: 'Yellow' },
                        { min: breaks[0], max: breaks[1],  color: '#fdae61', label: 'Orange' },
                        { min: 0,         max: breaks[0],  color: '#d73027', label: 'Red (Worst)' }
                    ];
                    ranges.forEach(r => {
                        div.innerHTML += `<span style="display:inline-block;width:14px;height:14px;background:${r.color};border-radius:3px;margin-right:6px;vertical-align:middle;"></span>${(r.min*100).toFixed(1)}–${(r.max*100).toFixed(1)}%<br>`;
                    });
                    return div;
                };
                legend.addTo(map);

                // 9. Zoom to data extent
                map.fitBounds(geoLayer.getBounds());
            })
            .catch(err => console.error("Fetch error:", err));
    });
    </script>
</body>
</html>
